version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: tinode-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # ❌ NO definir MYSQL_DATABASE aquí, deja que Tinode la cree
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tinode-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  tinode:
    image: tinode/tinode-mysql:latest
    container_name: tinode-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      RESET_DB: "false"
      UPGRADE_DB: "true"
      WAIT_FOR: "mysql:3306"
      MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/tinode?parseTime=true&collation=utf8mb4_unicode_ci"
      AUTH_TOKEN_KEY: ${AUTH_TOKEN_KEY}
      PLUGIN_PYTHON_CHAT_BOT_ENABLED: "false"
      EXT_STATIC_DIR: /opt/tinode/static
    ports:
      - "6060:6060"
      - "16060:16060"
    volumes:
      - tinode_uploads:/opt/tinode/uploads
    networks:
      - tinode-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6060/"]
      interval: 10s
      timeout: 5s
      retries: 10

  tinode-api:
    build: .
    container_name: tinode-api
    restart: unless-stopped
    depends_on:
      tinode:
        condition: service_healthy
    environment:
      TINODE_GRPC_HOST: "tinode:16060"
      TINODE_API_KEY: "${TINODE_API_KEY}"
      ADMIN_USER: "${ADMIN_USER}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      APP_NAME: "TinodeAdminAPI/1.0"
    ports:
      - "8000:8000"
    networks:
      - tinode-net

volumes:
  mysql_data:
  tinode_uploads:

networks:
  tinode-net:
    driver: bridge


